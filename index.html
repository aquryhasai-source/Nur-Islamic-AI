<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d1f14"/>
  <meta name="description" content="Ask anything about Islam — grounded in the Quran and authentic Hadith."/>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="NŪR"/>

  <!-- Open Graph (for sharing) -->
  <meta property="og:title" content="NŪR — Islamic Knowledge Assistant"/>
  <meta property="og:description" content="Ask anything about Islam, grounded in the Quran and authentic Hadith."/>
  <meta property="og:type" content="website"/>

  <title>NŪR — Islamic Knowledge Assistant</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      height: 100%;
      background: #081510;
      font-family: Georgia, serif;
      /* Safe area for notched phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Install banner */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      background: linear-gradient(135deg, #1a3a22, #0d2018);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px;
      padding: 14px 18px;
      z-index: 999;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #install-banner.show { display: flex; }
    #install-banner span {
      flex: 1;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      line-height: 1.5;
      font-family: Georgia, serif;
    }
    #install-banner strong { color: #c9a84c; }
    #install-btn {
      background: linear-gradient(135deg, #c9a84c, #a8862e);
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      color: #0d1f14;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      font-family: Georgia, serif;
    }
    #dismiss-btn {
      background: none;
      border: none;
      color: rgba(201,168,76,0.4);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Add to Home Screen banner -->
  <div id="install-banner">
    <span>📲 Add <strong>NŪR</strong> to your home screen for the best experience</span>
    <button id="install-btn">Install</button>
    <button id="dismiss-btn">✕</button>
  </div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    // ── Service Worker ──────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(console.error);
      });
    }

    // ── Install Banner ──────────────────────────────────────────────
    let deferredPrompt;
    const banner     = document.getElementById("install-banner");
    const installBtn = document.getElementById("install-btn");
    const dismissBtn = document.getElementById("dismiss-btn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show banner after 30s if not already installed
      setTimeout(() => {
        if (!window.matchMedia("(display-mode: standalone)").matches) {
          banner.classList.add("show");
        }
      }, 30000);
    });

    installBtn.addEventListener("click", async () => {
      banner.classList.remove("show");
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      }
    });

    dismissBtn.addEventListener("click", () => {
      banner.classList.remove("show");
    });
  </script>
</body>
</html>

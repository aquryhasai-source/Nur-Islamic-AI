  <!-- Nunito font -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>

  <!-- Open Graph -->
  <meta property="og:title" content="NŪR — Islamic Knowledge Assistant"/>
  <meta property="og:description" content="Ask anything about Islam, grounded in the Quran and authentic Hadith."/>
  <meta property="og:type" content="website"/>

  <title>NŪR — Islamic Knowledge Assistant</title>

  <!-- OneSignal Web SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "86fafaea-14ad-4786-8cf8-c4ee7d41fb16",
        serviceWorkerParam: { scope: "/" },
        serviceWorkerPath: "sw.js",
        notifyButton: { enable: false },
        allowLocalhostAsSecureOrigin: true,
      });
    });
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body,#root{height:100%;background:#081510;font-family:'Nunito',Georgia,sans-serif;}
    html{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/Main.jsx"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
